version: '3.8'

services:
  bgp-forwarder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bgp-forwarder
    environment:
      - BGP_PEER_IP=${BGP_PEER_IP:-192.168.1.1}
      - BGP_AS_NUMBER=${BGP_AS_NUMBER:-65000}
      - BGP_HTTP_ENDPOINT=${BGP_HTTP_ENDPOINT:-http://localhost:8080/bgp}
    # Privileged mode needed for BGP
    privileged: true
    # Host networking needed for BGP
    network_mode: host
    volumes:
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped
